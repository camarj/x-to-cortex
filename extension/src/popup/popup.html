<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>X to Cortex</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>X to Cortex</h1>
    <span id="server-status" class="status unknown">·</span>
  </header>

  <main>
    <p class="hint">
      Usa el botón <strong>→ Cortex</strong> en cada tweet para guardarlo.
    </p>
    <p class="hint subtle">
      Para hilos completos: entra al permalink del tweet (click en su fecha)
      y luego dale al botón. Así captura todo el hilo.
    </p>
  </main>

  <footer>
    <a href="http://localhost:7777/health" target="_blank">Server</a>
    <a href="https://github.com/camarj/x-to-cortex" target="_blank">GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
